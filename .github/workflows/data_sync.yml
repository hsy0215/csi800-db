name: Data Sync Workflows

on:
  workflow_dispatch:

jobs:
  run-main-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # 整个 job 最长 45 分钟，避免无限卡死

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install timeout-decorator

      - name: Run main sync with timeout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - << 'EOF'
          import timeout_decorator
          import subprocess

          @timeout_decorator.timeout(1800)  # Python 脚本最多运行 30 分钟
          def run_script():
              subprocess.run(["python", "main_sync.py"], check=True)

          try:
              run_script()
          except timeout_decorator.TimeoutError:
              print("❌ main_sync.py 超时（30 分钟），已强制停止")
              exit(1)
          EOF

  run-verification-job:
    needs: run-main-sync
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run verification
        run: python verify.py
